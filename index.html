<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>AlphaJournal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Inter;
  background:#0a0f1f;
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
}

.actions button{
  margin-left:10px;
  background:#121a2f;
  border:none;
  color:#fff;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
}

/* GRID */
.container{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.card{
  background:#121a2f;
  padding:20px;
  border-radius:14px;
}

.title{
  font-size:12px;
  opacity:0.6;
}

.value{
  font-size:22px;
  margin-top:5px;
}

.green{color:#00ffcc;}
.red{color:#ff4d6d;}

/* CHART */
.chart{grid-column:span 2;}
.calendar{grid-column:span 2;}

/* CALENDAR */
.days{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
  margin-top:10px;
}

.day{
  padding:12px;
  text-align:center;
  border-radius:6px;
  background:#1a2140;
}

.win{background:#123f35;}
.loss{background:#3a1c2a;}
.be{background:#444;}

/* ADD BUTTON */
.add{
  position:fixed;
  bottom:25px;
  right:25px;
  width:65px;
  height:65px;
  border-radius:50%;
  border:none;
  background:#00ffcc;
  font-size:28px;
  cursor:pointer;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.box{
  background:#121a2f;
  padding:20px;
  border-radius:10px;
  width:320px;
}

.box input,.box select{
  width:100%;
  margin:6px 0;
  padding:8px;
}
</style>
</head>

<body>

<div class="header">
  <h2>AlphaJournal</h2>

  <div class="actions">
    <button onclick="toggleTheme()">Tema</button>
    <button onclick="scrollCalendar()">Calendário</button>
    <button onclick="exportCSV()">CSV</button>
    <button onclick="logout()">Sair</button>
  </div>
</div>

<div class="container">

  <div class="card"><div class="title">NET P&L</div><div id="pnl" class="value">$0</div></div>
  <div class="card"><div class="title">WIN RATE</div><div id="winrate" class="value">0%</div></div>
  <div class="card"><div class="title">PROFIT FACTOR</div><div class="value">0</div></div>
  <div class="card"><div class="title">MAX DRAWDOWN</div><div class="value">0</div></div>

  <div class="card chart">
    <canvas id="chart"></canvas>
  </div>

  <div class="card calendar" id="calendarBox">
    <div class="title">P&L Calendar</div>
    <div class="days" id="calendar"></div>
  </div>

</div>

<button class="add" onclick="openModal()">+</button>

<div class="modal" id="modal">
  <div class="box">
    <h3>Adicionar Trade</h3>

    <input id="pair" placeholder="Par">
    <input id="result" type="number" placeholder="Resultado">
    <input id="rr" placeholder="RR">
    <input id="comment" placeholder="Comentário">
    <input type="file" id="image">

    <select id="direction">
      <option>Buy</option>
      <option>Sell</option>
    </select>

    <select id="type">
      <option value="win">Win</option>
      <option value="loss">Loss</option>
      <option value="be">Breakeven</option>
    </select>

    <input type="date" id="date">

    <button onclick="addTrade()">Salvar</button>
    <button onclick="closeModal()">Fechar</button>
  </div>
</div>

<script>
let trades = JSON.parse(localStorage.getItem("trades")) || [];

const chart = new Chart(document.getElementById("chart"),{
  type:'line',
  data:{labels:[],datasets:[{data:[],borderColor:"#00ffcc",tension:.4}]},
  options:{plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}
});

function save(){localStorage.setItem("trades",JSON.stringify(trades));}

function update(){
  let pnl=0,wins=0,total=0,eq=[];

  trades.forEach(t=>{
    pnl+=t.result;
    if(t.type=="win")wins++;
    total+=t.result;
    eq.push(total);
  });

  pnlEl.innerText="$"+pnl;
  winrate.innerText=trades.length?((wins/trades.length)*100).toFixed(1)+"%":"0%";

  chart.data.labels=trades.map((_,i)=>i+1);
  chart.data.datasets[0].data=eq;
  chart.update();

  renderCalendar();
}

function renderCalendar(){
  calendar.innerHTML="";
  for(let i=1;i<=31;i++){
    let d=document.createElement("div");
    d.className="day";
    d.innerText=i;

    let t=trades.find(x=>new Date(x.date).getDate()==i);
    if(t)d.classList.add(t.type);

    calendar.appendChild(d);
  }
}

function addTrade(){
  const file=image.files[0];
  let reader=new FileReader();

  reader.onload=function(){
    trades.push({
      pair:pair.value,
      result:+result.value,
      rr:rr.value,
      comment:comment.value,
      image:reader.result,
      direction:direction.value,
      type:type.value,
      date:date.value
    });

    save(); update(); closeModal();
  }

  if(file) reader.readAsDataURL(file);
  else reader.onload();
}

function openModal(){modal.style.display="flex";}
function closeModal(){modal.style.display="none";}
function toggleTheme(){document.body.classList.toggle("light");}
function scrollCalendar(){calendarBox.scrollIntoView({behavior:"smooth"});}

function exportCSV(){
  let csv="pair,result\n";
  trades.forEach(t=>csv+=`${t.pair},${t.result}\n`);
  let a=document.createElement("a");
  a.href="data:text/csv,"+encodeURIComponent(csv);
  a.download="trades.csv";
  a.click();
}

function logout(){alert("Sessão encerrada");}

update();
</script>

</body>
</html>
