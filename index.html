<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Journal</title>

<!-- Fonte -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #0b1020;
  color: #fff;
  padding: 20px;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

/* CARDS */
.card {
  background: #11182e;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

.title {
  font-size: 12px;
  color: #6c7aa0;
  margin-bottom: 10px;
}

.value {
  font-size: 24px;
  font-weight: 600;
}

.green { color: #00ffcc; }
.red { color: #ff4d6d; }

/* GRÁFICO */
.chart {
  grid-column: span 2;
}

canvas {
  width: 100%;
  height: 100px;
}

/* CALENDÁRIO */
.calendar {
  grid-column: span 2;
}

.days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 10px;
  margin-top: 10px;
}

.day {
  padding: 15px;
  text-align: center;
  border-radius: 8px;
  background: #182040;
}

.day.green { background: #123f35; }
.day.red { background: #3a1c2a; }

/* LISTAS */
.list {
  line-height: 2;
  font-size: 14px;
}

/* RESPONSIVO */
@media(max-width: 900px) {
  .container {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<h2 style="margin-bottom:20px;">AlphaJournal</h2>

<div class="container">

  <!-- CARDS -->
  <div class="card">
    <div class="title">NET P&L</div>
    <div class="value green">$8,245</div>
  </div>

  <div class="card">
    <div class="title">WIN RATE</div>
    <div class="value">67.3%</div>
  </div>

  <div class="card">
    <div class="title">PROFIT FACTOR</div>
    <div class="value green">2.14</div>
  </div>

  <div class="card">
    <div class="title">MAX DRAWDOWN</div>
    <div class="value red">-$890</div>
  </div>

  <!-- GRÁFICO -->
  <div class="card chart">
    <div class="title">Equity Curve</div>
    <canvas id="chart"></canvas>
  </div>

  <!-- CALENDÁRIO -->
  <div class="card calendar">
    <div class="title">P&L Calendar - March</div>
    <div class="days">
      <div class="day green">1</div>
      <div class="day green">2</div>
      <div class="day green">3</div>
      <div class="day red">4</div>
      <div class="day green">5</div>
      <div class="day green">6</div>
      <div class="day red">7</div>
    </div>
  </div>

  <!-- STRATEGY -->
  <div class="card">
    <div class="title">By Strategy</div>
    <div class="list">
      Breakout — <span class="green">$4,128</span><br>
      Reversal — <span class="green">$2,898</span><br>
      Trend — <span class="green">$1,235</span>
    </div>
  </div>

  <!-- SESSIONS -->
  <div class="card">
    <div class="title">Sessions</div>
    <div class="list">
      Asia — <span class="green">$1,268</span><br>
      London — <span class="green">$3,878</span><br>
      New York — <span class="green">$3,135</span>
    </div>
  </div>

</div>

<!-- CHART JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
  type: 'line',
  data: {
    labels: ["1","2","3","4","5","6","7"],
    datasets: [{
      data: [1000, 2000, 3000, 4000, 3800, 4200, 5000],
      borderColor: "#00ffcc",
      borderWidth: 2,
      tension: 0.4,
      fill: true,
      backgroundColor: "rgba(0,255,204,0.1)"
    }]
  },
  options: {
    plugins: { legend: { display: false }},
    scales: {
      x: { display: false },
      y: { display: false }
    }
  }
});
</script>

</body>
</html>
