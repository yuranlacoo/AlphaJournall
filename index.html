<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Journal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0b1020;
  --card: #11182e;
  --text: #ffffff;
  --accent: #00ffcc;
}

.light {
  --bg: #f5f5f5;
  --card: #ffffff;
  --text: #111;
  --accent: #0077ff;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
}

.actions button {
  margin-left: 10px;
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* GRID */
.container {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

.card {
  background: var(--card);
  padding: 20px;
  border-radius: 12px;
}

.title {
  font-size: 12px;
  opacity: 0.6;
}

.value {
  font-size: 22px;
  margin-top: 5px;
}

.chart {
  grid-column: span 2;
}

.calendar {
  grid-column: span 2;
}

.days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 10px;
  margin-top: 10px;
}

.day {
  padding: 12px;
  text-align: center;
  border-radius: 6px;
  background: #182040;
}

/* EMPTY STATE */
.empty {
  text-align: center;
  padding: 40px;
  opacity: 0.6;
}

/* RESPONSIVO */
@media(max-width: 900px){
  .container { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>AlphaJournal</h2>

  <div class="actions">
    <button onclick="toggleTheme()">Tema</button>
    <button onclick="goCalendar()">Calendário</button>
    <button onclick="exportCSV()">Exportar CSV</button>
    <button onclick="logout()">Sair</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="container">

  <div class="card">
    <div class="title">NET P&L</div>
    <div class="value">$0.00</div>
  </div>

  <div class="card">
    <div class="title">WIN RATE</div>
    <div class="value">0%</div>
  </div>

  <div class="card">
    <div class="title">PROFIT FACTOR</div>
    <div class="value">0.00</div>
  </div>

  <div class="card">
    <div class="title">MAX DRAWDOWN</div>
    <div class="value">$0</div>
  </div>

  <div class="card chart">
    <div class="title">Equity Curve</div>
    <div class="empty">Sem dados ainda</div>
  </div>

  <div class="card calendar" id="calendarSection">
    <div class="title">Calendário</div>
    <div class="days">
      <div class="day">1</div>
      <div class="day">2</div>
      <div class="day">3</div>
      <div class="day">4</div>
      <div class="day">5</div>
      <div class="day">6</div>
      <div class="day">7</div>
    </div>
  </div>

</div>

<script>

/* TEMA */
function toggleTheme() {
  document.body.classList.toggle("light");
}

/* IR PARA CALENDÁRIO */
function goCalendar() {
  document.getElementById("calendarSection").scrollIntoView({ behavior: "smooth" });
}

/* EXPORT CSV */
function exportCSV() {
  const csv = "data:text/csv;charset=utf-8,Sem dados ainda";
  const link = document.createElement("a");
  link.href = encodeURI(csv);
  link.download = "trades.csv";
  link.click();
}

/* SAIR */
function logout() {
  alert("Sessão encerrada (simulação)");
}

</script>

</body>
</html>
